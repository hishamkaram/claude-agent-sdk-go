name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so golangci-lint `new-from-merge-base: origin/main`
          # (new-code-only ramp in .golangci.yml) can resolve the merge-base.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
      - name: Go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
      - name: Test with race detector
        run: go test -race -count=1 -p 4 -short -coverprofile=coverage.out ./...
      - name: Enforce coverage minimum (65%)
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t == "" || (t+0) < 65) { print "::error::Coverage "t"% is below the 65% minimum"; exit 1 } }'
      - name: Build check
        run: go build ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
