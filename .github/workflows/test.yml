name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history kept for any history-dependent checks. The
          # new-code-only ramp (new-from-merge-base) was removed from
          # .golangci.yml once the legacy backlog reached zero; lint now
          # runs full-strength against all code.
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.11'
      - name: Go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - name: Test with race detector
        run: go test -race -count=1 -p 4 -short -coverprofile=coverage.out ./...
      - name: Enforce coverage minimum (65%)
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t == "" || (t+0) < 65) { print "::error::Coverage "t"% is below the 65% minimum"; exit 1 } }'
      - name: Build check
        run: go build ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
